# =============================================================================
# Kestra - Workflow Orchestration Platform
# =============================================================================
# Modern, event-driven workflow orchestration for data pipelines, ETL,
# infrastructure automation, and scheduled tasks.
#
# Features:
#   - Declarative YAML workflows
#   - Event-driven triggers (cron, webhooks, file, message queues)
#   - 400+ plugins (AWS, GCP, Azure, databases, APIs)
#   - Real-time execution monitoring
#   - Built-in code editor
#
# Access: https://kestra.YOUR_DOMAIN
# Default: admin / (generated password)
# =============================================================================

services:
  # ---------------------------------------------------------------------------
  # Kestra - Workflow Engine
  # ---------------------------------------------------------------------------
  # Pinned to the current Kestra LTS (v1.0.x). Since Kestra v1.0 the default
  # tag already bundles every official plugin — Databricks JDBC, Snowflake,
  # Postgres, Trino, Redshift, and ~15 more — so no `-full` variant is
  # needed. (The legacy `kestra/kestra:*-full` tags still exist on Docker
  # Hub but were abandoned at Kestra 0.20.15 as of the 2026-04-23 check;
  # do not use them.) For a core-only slim image override IMAGE_KESTRA to
  # `kestra/kestra:v1.0-no-plugins`.
  kestra:
    image: ${IMAGE_KESTRA:-kestra/kestra:v1.0}
    container_name: kestra
    # Service-specific .env with credentials (generated by deploy.sh)
    # Not the global stacks/.env for image versions
    env_file:
      - .env
    restart: unless-stopped
    user: "root"
    command: server standalone
    ports:
      - "8085:8080"
    environment:
      KESTRA_CONFIGURATION: |
        datasources:
          postgres:
            url: jdbc:postgresql://kestra-postgres:5432/kestra
            driverClassName: org.postgresql.Driver
            username: nexus-kestra
            password: ${KESTRA_DB_PASSWORD}
        kestra:
          server:
            basic-auth:
              enabled: true
              username: ${KESTRA_ADMIN_USER}
              password: ${KESTRA_ADMIN_PASSWORD}
          repository:
            type: postgres
          storage:
            type: local
            local:
              base-path: /app/storage
          queue:
            type: postgres
          tasks:
            tmp-dir:
              path: /tmp/kestra-wd/tmp
          url: ${KESTRA_URL}
    deploy:
      resources:
        limits:
          # The v1.0 default image bundles ~98 plugin JARs (see note on the
          # image line above). Plugin metadata alone sits at ~700–900 MB in
          # the JVM heap, before any flow executions start. With the old
          # 1 GB cap the JVM spent its time in GC-thrashing (observed 97 %
          # memory utilisation and 200 %+ CPU on an idle container). 4 GB
          # matches Kestra's own "many plugins" recommendation and leaves
          # breathing room for parallel classroom flow executions.
          memory: 4g
    volumes:
      - kestra-data:/app/storage
      - /var/run/docker.sock:/var/run/docker.sock
      - /tmp/kestra-wd:/tmp/kestra-wd
    depends_on:
      kestra-postgres:
        condition: service_healthy
    networks:
      - app-network
      - kestra-internal

  # ---------------------------------------------------------------------------
  # PostgreSQL - Kestra Database
  # ---------------------------------------------------------------------------
  kestra-postgres:
    image: postgres:16-alpine
    container_name: kestra-postgres
    restart: unless-stopped
    env_file:
      - .env
    environment:
      POSTGRES_DB: kestra
      POSTGRES_USER: nexus-kestra
      POSTGRES_PASSWORD: ${KESTRA_DB_PASSWORD}
    volumes:
      - kestra-postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U nexus-kestra -d kestra"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - kestra-internal

# =============================================================================
# Volumes
# =============================================================================
volumes:
  kestra-data:
  kestra-postgres-data:

# =============================================================================
# Networks
# =============================================================================
networks:
  app-network:
    external: true
  kestra-internal:
    driver: bridge

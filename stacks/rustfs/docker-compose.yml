# =============================================================================
# RustFS - Rust-based S3-Compatible Object Storage
# =============================================================================
# High-performance MinIO alternative written in Rust
# Accessible via: https://rustfs.<domain>
#
# Ports:
#   - 9002 (Console, host → container 9001) — Cloudflare-Tunnel HTTP path
#   - 9003 (S3 API)                         — NOT published by the base
#     compose. Enable the `rustfs → s3-api` Firewall rule in the Control
#     Plane and Spin Up to expose host 9003 → container 9000.
#     Cross-stack traffic on app-network can still reach the API as
#     `rustfs:9000` internally without the toggle.
#
# Default credentials:
#   Access Key: ${RUSTFS_ACCESS_KEY}
#   Secret Key: Generated by OpenTofu (stored in Infisical)
#
# Documentation: https://docs.rustfs.com
# =============================================================================

services:
  rustfs:
    image: ${IMAGE_RUSTFS:-rustfs/rustfs:1.0.0-alpha.82}
    container_name: rustfs
    restart: unless-stopped
    user: "10001:10001"
    # Host port 9003 (S3 API) is gated on the firewall toggle —
    # docker-compose.firewall.yml adds it as 9003:9000 when an operator
    # enables the rule in the Control Plane. Listing it here would
    # create a duplicate-host-port collision after merge (same bug as
    # ClickHouse, issue #488). The container always listens on 9000
    # internally, so cross-stack traffic on app-network can still reach
    # it as rustfs:9000 without the host port.
    ports:
      - "9002:9001"  # Web Console (host 9002 -> container 9001)
    env_file: .env
    environment:
      # RustFS uses RUSTFS_ACCESS_KEY/SECRET_KEY (not ROOT_USER/PASSWORD)
      RUSTFS_ACCESS_KEY: ${RUSTFS_ACCESS_KEY:-rustfs}
      RUSTFS_SECRET_KEY: ${RUSTFS_SECRET_KEY}
      RUSTFS_ADDRESS: ":9000"
      RUSTFS_CONSOLE_ENABLE: "true"
    command: /data
    deploy:
      resources:
        limits:
          memory: 512m
    volumes:
      - rustfs_data:/data
    networks:
      - app-network
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://127.0.0.1:9000/ || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

volumes:
  rustfs_data:

networks:
  app-network:
    external: true

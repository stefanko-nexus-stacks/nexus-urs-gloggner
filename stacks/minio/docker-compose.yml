# =============================================================================
# MinIO - High-Performance S3-Compatible Object Storage
# =============================================================================
# Self-hosted object storage compatible with Amazon S3 API
# Accessible via: https://minio.<domain>
#
# Port: 9001 (Console, host-published), 9000 (S3 API, opt-in via firewall)
#
# Default credentials:
#   Root User: ${MINIO_ROOT_USER}
#   Root Password: Generated by OpenTofu (stored in Infisical)
#
# Documentation: https://min.io/docs
# =============================================================================

services:
  minio:
    image: ${IMAGE_MINIO:-quay.io/minio/minio:RELEASE.2025-09-07T16-13-09Z}
    container_name: minio
    restart: unless-stopped
    ports:
      # Web Console: bound to the host so Cloudflare Tunnel can reach
      # it at http://localhost:9001 (Tunnel routes minio.<domain> here).
      - "9001:9001"
      #
      # S3 API port (9000) is intentionally NOT published to the host in
      # the base compose. When the user opts the port in via the
      # Control Plane firewall page, scripts/deploy.sh writes a
      # docker-compose.firewall.yml that adds the `9000:9000` mapping
      # there, so the port is published exactly once. Same pattern as
      # Redpanda / SFTPGo. Keeping the mapping here AND in the override
      # would yield duplicated `ports:` entries when compose merges them.
      # Other in-stack containers reach MinIO via the Docker network
      # service name `minio:9000` regardless.
    environment:
      # Root credentials
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
      # Console configuration
      MINIO_BROWSER_REDIRECT_URL: https://minio.${DOMAIN}
    command: server /data --console-address ":9001"
    deploy:
      resources:
        limits:
          memory: 2g
    volumes:
      - minio_data:/data
    networks:
      - app-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

volumes:
  minio_data:

networks:
  app-network:
    external: true

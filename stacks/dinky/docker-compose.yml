# =============================================================================
# Dinky - Flink SQL IDE
# =============================================================================
# Access via: https://dinky.${domain} (Web UI)
# Dinky is a real-time data development platform based on Apache Flink,
# providing a web-based SQL editor with auto-completion, syntax verification,
# job management, and real-time debugging.
#
# IMAGE: Custom build based on dinkydocker/dinky-standalone-server with
# Kafka SQL connector pre-installed. ARM64 supported.
#
# LOCALE: Dinky defaults to Chinese (zh-CN). The entrypoint patches index.html
# to set umi_locale=en-US in localStorage before the Umi framework loads.
# This only applies on first visit; users can switch language manually.
#
# FLINK CONNECTION: Dinky connects to the Flink JobManager via app-network.
# After first login, add the Flink cluster in: Settings → Cluster Management
# → Add → REST address: http://flink-jobmanager:8081
#
# SECURITY:
# - Protected by Cloudflare Access (email OTP authentication)
# - Admin password generated by OpenTofu and stored in Infisical
# - Default credentials (admin/dinky123!@#) are overridden at deploy time
# =============================================================================

services:
  dinky:
    build: .
    image: ${IMAGE_DINKY:-nexus-dinky:1.2.5-flink1.20}
    container_name: dinky
    hostname: dinky
    restart: unless-stopped
    entrypoint: ["/bin/sh", "-c"]
    command:
      - |
        if ! grep -q 'DINKY_LOCALE_INIT' /opt/dinky/config/static/index.html; then
          sed -i 's|<head>|<head><script>/*DINKY_LOCALE_INIT*/if(!localStorage.getItem("umi_locale")){localStorage.setItem("umi_locale","en-US");}</script>|' /opt/dinky/config/static/index.html
        fi
        exec ./bin/auto.sh startOnPending
    environment:
      DB_ACTIVE: h2
    env_file:
      - path: .env
        required: false
    ports:
      - "8889:8888"
    networks:
      - app-network
    deploy:
      resources:
        limits:
          cpus: "2"
          memory: 2560m
        reservations:
          cpus: "0.25"
          memory: 512m
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8888 || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 45s

networks:
  app-network:
    external: true

services:
  excalidraw:
    image: ${IMAGE_EXCALIDRAW:-excalidraw/excalidraw:latest}
    container_name: excalidraw
    restart: unless-stopped
    ports:
      - "8082:80"
    deploy:
      resources:
        limits:
          memory: 256m
    healthcheck:
      test: ["CMD-SHELL", "wget --no-verbose --tries=1 --spider http://localhost:80/ || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
    networks:
      - app-network

networks:
  app-network:
    external: true

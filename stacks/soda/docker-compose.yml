# =============================================================================
# Soda Core - Data Quality Testing (CLI-only)
# =============================================================================
# Define data quality checks with SodaCL YAML and scan your databases.
# Supports PostgreSQL, MySQL, Snowflake, BigQuery, and more.
#
# Internal Access: docker exec -it soda soda scan ...
# Docs: https://docs.soda.io/
# =============================================================================

services:
  soda:
    build:
      context: .
      dockerfile: Dockerfile
    # Local build via the adjacent Dockerfile. Image tag was previously
    # `soda-core-arm64` because Soda's official image is x86-only and
    # Nexus-Stack shipped an ARM rebuild. The local Dockerfile uses
    # `python:3.11-slim` (multi-arch) + `pip install soda-core-postgres`
    # (PyPI serves arch-correct wheels), so it builds correctly on
    # both Hetzner cax (ARM) and cpx (x86). Renamed to plain
    # `soda-core` to reflect the now-multi-arch reality.
    image: ${IMAGE_SODA:-soda-core:3.3.7}
    container_name: soda
    restart: unless-stopped
    environment:
      - SODA_DB_HOST=soda-db
      - SODA_DB_PORT=5432
      - SODA_DB_USER=nexus-soda
      - SODA_DB_PASSWORD=${SODA_DB_PASSWORD}
      - SODA_DB_NAME=soda
    deploy:
      resources:
        limits:
          memory: 256m
    volumes:
      - soda-data:/workspace
    working_dir: /workspace
    networks:
      - app-network
      - soda-internal
    depends_on:
      soda-db:
        condition: service_healthy
    command: ["sleep", "infinity"]

  soda-db:
    image: postgres:16-alpine
    container_name: soda-db
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 512m
    environment:
      - POSTGRES_USER=nexus-soda
      - POSTGRES_PASSWORD=${SODA_DB_PASSWORD}
      - POSTGRES_DB=soda
    volumes:
      - soda-db-data:/var/lib/postgresql/data
    networks:
      - soda-internal
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U nexus-soda -d soda"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  soda-data:
  soda-db-data:

networks:
  app-network:
    external: true
  soda-internal:
    driver: bridge

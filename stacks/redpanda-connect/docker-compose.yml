# =============================================================================
# Redpanda Connect - Data Streaming Framework (Streams Mode)
# =============================================================================
# Declarative data streaming connector framework (formerly Benthos) for building
# real-time data pipelines with hundreds of prebuilt connectors.
#
# Runs in STREAMS MODE: multiple pipelines can run in parallel, managed via
# the REST API on port 4195. Students can create/delete/monitor pipelines
# from code-server or Hoppscotch.
#
# API:
#   POST   /streams/{id}        Create a new pipeline
#   GET    /streams              List all pipelines
#   GET    /streams/{id}         Get pipeline config and status
#   DELETE /streams/{id}         Remove a pipeline
#
# Access: https://redpanda-connect.<domain>
# Docs: https://docs.redpanda.com/redpanda-connect/guides/streams_mode/
# =============================================================================

services:
  redpanda-connect:
    image: ${IMAGE_REDPANDA_CONNECT:-redpandadata/connect:4.43.0}
    container_name: redpanda-connect
    restart: unless-stopped
    command: streams
    ports:
      - "4195:4195"
    environment:
      - CONNECT_BROKERS=redpanda:9092
    deploy:
      resources:
        limits:
          memory: 256m
    networks:
      - app-network
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:4195/ready"]
      interval: 30s
      timeout: 10s
      retries: 3

networks:
  app-network:
    external: true

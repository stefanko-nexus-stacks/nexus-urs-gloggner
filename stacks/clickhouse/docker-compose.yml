# =============================================================================
# ClickHouse - Real-Time Analytics Database
# =============================================================================
# Fast, open-source columnar database for real-time analytics and OLAP queries.
#
# Access: https://clickhouse.YOUR_DOMAIN (Play UI for interactive queries)
# Native TCP: Port 9004 (external clients like DBeaver, DataGrip) — not
#             published by the base compose. Enable the
#             `clickhouse → native` Firewall rule in the Control Plane
#             and Spin Up to expose host port 9004 → container 9000.
#             Cross-stack traffic on app-network can still reach the
#             daemon as `clickhouse:9000` internally without the toggle.
#
# Default credentials:
#   User: nexus-clickhouse
#   Password: Generated by OpenTofu (stored in Infisical)
#
# Documentation: https://clickhouse.com/docs
# =============================================================================

services:
  clickhouse:
    image: ${IMAGE_CLICKHOUSE:-clickhouse/clickhouse-server:25.8.16.34}
    container_name: clickhouse
    restart: unless-stopped
    # Host port 9004 (native TCP) is gated on the firewall toggle —
    # docker-compose.firewall.yml adds it as 9004:9000 when an
    # operator enables the rule in the Control Plane. Listing it here
    # too would create a duplicate-host-port collision after merge
    # (issue #488). The container always listens on 9000 internally,
    # so cross-stack traffic on app-network can still reach it as
    # clickhouse:9000 without the host port.
    ports:
      - "8123:8123"
    env_file: .env
    environment:
      CLICKHOUSE_USER: nexus-clickhouse
      CLICKHOUSE_PASSWORD: ${CLICKHOUSE_ADMIN_PASSWORD}
      CLICKHOUSE_DEFAULT_ACCESS_MANAGEMENT: 1
    deploy:
      resources:
        limits:
          memory: 2g
    volumes:
      - clickhouse-data:/var/lib/clickhouse
      - clickhouse-logs:/var/log/clickhouse-server
    networks:
      - app-network
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:8123/ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s
    ulimits:
      nofile:
        soft: 262144
        hard: 262144

volumes:
  clickhouse-data:
  clickhouse-logs:

networks:
  app-network:
    external: true

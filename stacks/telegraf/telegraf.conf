# Telegraf configuration
# Collects system and Docker metrics, outputs to Prometheus
# Edit this file to add more inputs and outputs
# Docs: https://docs.influxdata.com/telegraf/

[agent]
  interval = "30s"
  round_interval = true
  flush_interval = "30s"
  hostname = "nexus-stack"

# --- Inputs ---

[[inputs.cpu]]
  percpu = true
  totalcpu = true

[[inputs.mem]]

[[inputs.disk]]
  ignore_fs = ["tmpfs", "devtmpfs", "devfs", "iso9660", "overlay", "aufs", "squashfs"]

[[inputs.net]]

[[inputs.system]]

[[inputs.docker]]
  endpoint = "unix:///var/run/docker.sock"
  gather_services = false
  container_names = []
  perdevice = false
  total = true

# --- Outputs ---

[[outputs.prometheus_client]]
  listen = ":9273"
  metric_version = 2

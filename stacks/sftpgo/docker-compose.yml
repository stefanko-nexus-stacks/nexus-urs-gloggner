# =============================================================================
# SFTPGo - SFTP/SCP server with R2 backend
# Web admin: https://sftpgo.${DOMAIN}
# SFTP:      sftp://<user>@<server-ip>:2022   (after firewall opt-in via Control Plane)
# =============================================================================
# SFTPGo gives external tools (CDC pipelines, BI exports, partner-data
# dropoffs) a standard SFTP door onto the same R2 datalake the rest of
# the stack already operates on. SFTPGo upstream also supports WebDAV
# and FTPS; this stack disables both by default (see the
# `SFTPGO_WEBDAVD__BINDINGS__0__PORT=0` line in `environment:` below)
# because they're additional protocol surfaces with their own auth/path
# config and aren't needed for the R2-frontend use case. Enable per-
# binding in `environment:` if you need them. Per-user virtual
# filesystems can each pin to a different bucket prefix; the default
# user `nexus-default` created by deploy.sh has a local-FS home plus
# two virtual-folder mounts: `/cloudflare_r2/` → R2 datalake bucket
# root, `/hetzner_s3/` → Hetzner Object Storage bucket root. Both
# mount with empty key_prefix so the SFTP user sees the entire bucket
# (matching what Kestra / Spark / direct-S3 clients write). Operators
# can add additional virtual folders for AWS S3, GCS, etc. via the
# admin UI — see docs/stacks/sftpgo.md.
#
# Login: admin user `nexus-sftpgo`, password generated by OpenTofu and
# available in Infisical under folder `sftpgo`, key
# `SFTPGO_ADMIN_PASSWORD`. Default SFTP user `nexus-default` likewise —
# its password is in Infisical under folder `sftpgo`, key
# `SFTPGO_USER_PASSWORD`. The web admin UI is gated by Cloudflare Access
# email-OTP on top.
#
# Local state is ephemeral. SFTPGo's SQLite at /var/lib/sftpgo tracks
# only the admin account, the `nexus-default` user definition, and SFTP
# host keys — none of which need to outlive the container. Real user
# files live in R2 / Hetzner Object Storage via the virtual-folder S3
# vfs configs (`/cloudflare_r2/`, `/hetzner_s3/` — both mounted at
# their respective bucket roots), not in /var/lib/sftpgo.
#
# We therefore use a docker-named-volume rather than a bind-mount onto
# the persistent Hetzner volume at /mnt/nexus-data/. This is deliberate:
# - destroy-all preserves /mnt/nexus-data/ (Gitea repos, Postgres data
#   that genuinely need to outlive a teardown live there) but
# - random_password.sftpgo_admin / random_password.sftpgo_user values
#   are stable across normal `tofu apply` runs (Terraform / OpenTofu
#   only regenerates these on resource replacement — i.e. after
#   `tofu destroy` clears state, after a manual `tofu taint`, or after
#   editing the resource definition). However, our `destroy-all`
#   workflow IS exactly that "tofu destroy" path, so a destroy +
#   initial-setup cycle DOES rotate both passwords. With a persisted
#   SQLite, the new env-var passwords would no longer match the on-
#   volume bcrypt hashes from the previous life → 401 forever, plus
#   "user already exists" 400s on the user re-create.
# An ephemeral docker-named-volume side-steps the whole class of state-
# mismatch problems: every fresh apply gets a clean DB,
# CREATE_DEFAULT_ADMIN bootstraps the admin with the current env-var
# password, and POST /api/v2/users creates `nexus-default` cleanly.
#
# Trade-off: SFTP host keys regenerate on every fresh deploy → SFTP
# clients see one "REMOTE HOST IDENTIFICATION HAS CHANGED" warning and
# need to refresh their known_hosts (`ssh-keygen -R <host>`). This is
# acceptable for a teardown-and-rebuild workflow.
#
# ARM64 compatibility: drakkan/sftpgo:v2.7.1 ships a multi-arch manifest
# with linux/amd64, linux/arm64, linux/arm/v7, and linux/ppc64le. The
# arm64 entry is the one we run on Hetzner cax-class (Ampere Altra) ARM
# servers. Verified via `docker manifest inspect drakkan/sftpgo:v2.7.1`
# on 2026-04-28 (per CLAUDE.md "Adding New Stacks → Verify ARM64
# compatibility BEFORE creating the stack").
# =============================================================================

services:
  sftpgo:
    image: ${IMAGE_SFTPGO:-drakkan/sftpgo:v2.7.1}
    container_name: sftpgo
    restart: unless-stopped
    ports:
      # Web admin UI: bound to the host so Cloudflare Tunnel can reach
      # it at http://localhost:8090 (Tunnel routes sftpgo.<domain> here).
      - "8090:8080"
      #
      # SFTP port (2022) is intentionally NOT published to the host in
      # the base compose. When the user opts the port in via the
      # Control Plane firewall page, scripts/deploy.sh writes a
      # docker-compose.firewall.yml that adds the `2022:2022` mapping
      # there, so the port is published exactly once. Same pattern as
      # Redpanda. Keeping the mapping in the base file too would yield
      # duplicated `ports:` entries when the override layers on top.
    environment:
      # Bootstrap admin on first start; idempotent on re-deploy.
      - SFTPGO_DATA_PROVIDER__CREATE_DEFAULT_ADMIN=1
      - SFTPGO_DEFAULT_ADMIN_USERNAME=nexus-sftpgo
      - SFTPGO_DEFAULT_ADMIN_PASSWORD=${SFTPGO_ADMIN_PASSWORD}
      # HTTP admin/REST bindings.
      - SFTPGO_HTTPD__BINDINGS__0__PORT=8080
      - SFTPGO_HTTPD__BINDINGS__0__ADDRESS=0.0.0.0
      # SFTP daemon binding. 2022 (not 22) so SFTPGo can run as non-root.
      - SFTPGO_SFTPD__BINDINGS__0__PORT=2022
      - SFTPGO_SFTPD__BINDINGS__0__ADDRESS=0.0.0.0
      # Disable WebDAV by default — the SFTP and HTTPS surfaces are
      # plenty for v1 and WebDAV needs its own auth/path config.
      - SFTPGO_WEBDAVD__BINDINGS__0__PORT=0
      - TZ=Europe/Zurich
    deploy:
      resources:
        limits:
          memory: 512m
    # No healthcheck: drakkan/sftpgo:v2.7.1 is a minimal image with
    # `sh` available (deploy.sh's mkdir/chown step uses
    # `docker exec sftpgo sh -c …` and works) but NO `curl` / `wget`,
    # so the previous shell-based `curl -sf /healthz` probe always
    # exited non-zero and marked the container "unhealthy" even
    # though the HTTP server answers /healthz fine on port 8080.
    # Reachability is verified externally via the Cloudflare Tunnel
    # (a real hang surfaces as a 502 at https://sftpgo.<domain>);
    # deploy.sh's auth-aware readiness probe (in scripts/deploy.sh)
    # covers the cold-start race during initial spin-up.
    volumes:
      # Docker-named-volume (NOT a bind-mount onto /mnt/nexus-data/).
      # See the top-of-file Persistent state comment for rationale —
      # ephemeral SQLite avoids stale-bcrypt-hash mismatches across
      # destroy-all + initial-setup. User files live in R2.
      - sftpgo-data:/var/lib/sftpgo
    networks:
      - app-network

volumes:
  sftpgo-data:

networks:
  app-network:
    external: true

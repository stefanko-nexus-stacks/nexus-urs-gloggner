# =============================================================================
# Pre-commit hooks for Nexus-Stack
# =============================================================================
# Runs locally before every git commit. Same checks as CI, just earlier
# in the loop so you don't push then wait for the runner to tell you
# `ruff check` failed on whitespace.
#
# Setup:   `uv sync` (installs pre-commit via dev-deps) + `uv run pre-commit install`
# Run all: `pre-commit run --all-files`
# Skip a hook for one commit (don't make this a habit):
#          `SKIP=ruff git commit -m "..."`
# =============================================================================

repos:
  # ---------------------------------------------------------------------------
  # Generic hygiene — file-format basics
  # ---------------------------------------------------------------------------
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: trailing-whitespace
        # Markdown's two-space-line-break is a real syntax — don't strip those.
        args: [--markdown-linebreak-ext=md]
      - id: end-of-file-fixer
      - id: check-yaml
        # docker-compose & GH-Actions YAML allow document-fragments per file
        args: [--allow-multiple-documents]
        # Skip files with templating that confuses the parser
        exclude: ^stacks/.+/docker-compose\.yml$
      - id: check-toml
      - id: check-json
      - id: check-merge-conflict
      - id: check-added-large-files
        args: [--maxkb=1024]
      - id: mixed-line-ending
        args: [--fix=lf]

  # ---------------------------------------------------------------------------
  # Ruff — Python lint + format
  # The `ruff-format` runs first to canonicalize, then `ruff` checks the rest.
  # ---------------------------------------------------------------------------
  - repo: https://github.com/astral-sh/ruff-pre-commit
    # Pinned to match the project venv's ruff (uv lock resolves
    # `ruff>=0.7,<1.0` to the latest patch). Drift between this
    # rev and the venv version produces "Would reformat: …" CI
    # failures that pass pre-commit — the exact scenario that
    # blocked PR #558. Bump in lockstep with `uv sync` upgrades.
    rev: v0.15.12
    hooks:
      - id: ruff-format
        files: ^(src|tests)/.*\.py$
      - id: ruff
        files: ^(src|tests)/.*\.py$
        args: [--fix, --exit-non-zero-on-fix]

  # ---------------------------------------------------------------------------
  # Mypy — strict type checking
  # Slow-ish (~1-3 sec on this codebase). Worth it.
  # Pinned to match pyproject.toml's [dependency-groups].dev.mypy bound.
  # ---------------------------------------------------------------------------
  # mypy via the project's uv venv — NOT mirrors-mypy's isolated env.
  #
  # The previous form (mirrors-mypy + additional_dependencies) built
  # an isolated pip env without nexus_deploy itself installed, so
  # every `from nexus_deploy.X import Y` in tests/ failed with
  # `import-not-found`. CI mypy passes because it runs
  # `uv run mypy` against the project-installed package; pre-commit
  # was missing that same wiring.
  #
  # Switching to `language: system + uv run mypy` aligns local
  # pre-commit with CI exactly — same mypy version, same site-
  # packages, same pyproject.toml config — so a green pre-commit
  # actually predicts a green CI typecheck.
  #
  # `pass_filenames: false` because mypy's `files = [...]` setting
  # in pyproject.toml already picks the right scope; passing
  # individual filenames in addition would make mypy ignore the
  # config-file's files= directive.
  - repo: local
    hooks:
      - id: mypy
        name: mypy (project venv, strict)
        entry: uv run mypy
        language: system
        types: [python]
        files: ^(src|tests)/.*\.py$
        pass_filenames: false
        args: [--config-file=pyproject.toml]

  # ---------------------------------------------------------------------------
  # Shellcheck — for the bash helper scripts in scripts/ (init-r2-state,
  # cleanup-orphaned-resources, setup-control-plane-secrets,
  # check-control-plane-env, capture-phase1-baselines,
  # check-cloudflare-pages-logs, parse-services-yaml). The deploy
  # path itself is Python since Phase 4c (#535); these are operator
  # one-shots, not part of the spin-up loop.
  # Pre-commit installs shellcheck via the precommit-shfmt-shellcheck mirror.
  # ---------------------------------------------------------------------------
  - repo: https://github.com/shellcheck-py/shellcheck-py
    rev: v0.10.0.1
    hooks:
      - id: shellcheck
        files: ^scripts/.*\.sh$
        args:
          # `--severity=error` only blocks real bugs; the helpers carry a
          # few pre-existing style/info nits we tolerate.
          - --severity=error
          # SC1091: not following sourced files (we source ../backend.hcl
          # which lives outside the repo at runtime — checkable only on VM).
          # SC2001: prefer parameter expansion — too noisy, sed/regex
          # readability often trumps perf savings here.
          - --exclude=SC1091,SC2001

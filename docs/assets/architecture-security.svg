<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 920 380" font-family="'SF Mono', 'Fira Code', 'Consolas', monospace">
  <defs>
    <linearGradient id="sf-glow" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#00ff88;stop-opacity:0.1"/>
      <stop offset="100%" style="stop-color:#00ff88;stop-opacity:0.03"/>
    </linearGradient>
    <filter id="sf-shadow">
      <feDropShadow dx="0" dy="1" stdDeviation="2" flood-color="#00ff88" flood-opacity="0.25"/>
    </filter>
    <marker id="sf-arrow" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#00ff88"/>
    </marker>
    <marker id="sf-arrow-red" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#d63939"/>
    </marker>
    <marker id="sf-arrow-dim" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#334"/>
    </marker>
    <marker id="sf-arrow-orange" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#f6821f"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="920" height="380" rx="12" fill="#0a0a0f"/>
  <rect width="920" height="380" rx="12" fill="url(#sf-glow)" opacity="0.5"/>

  <!-- Title -->
  <text x="460" y="30" fill="#00ff88" font-size="13" font-weight="bold" text-anchor="middle" letter-spacing="2">TRAFFIC FLOW: ZERO OPEN PORTS</text>

  <!-- ===== PATH 1: HTTPS via Tunnel (main path) ===== -->
  <text x="30" y="75" fill="#00ff88" font-size="10" font-weight="bold" letter-spacing="1">HTTPS (Tunnel)</text>

  <!-- User -->
  <rect x="30" y="90" width="100" height="50" rx="8" fill="#0d2818" stroke="#00ff88" stroke-width="1.5" filter="url(#sf-shadow)"/>
  <text x="80" y="112" fill="#00ff88" font-size="11" font-weight="bold" text-anchor="middle">User</text>
  <text x="80" y="128" fill="#00cc6a" font-size="8" text-anchor="middle">Browser</text>

  <!-- Arrow: User -> DNS -->
  <line x1="130" y1="115" x2="165" y2="115" stroke="#00ff88" stroke-width="1.5" marker-end="url(#sf-arrow)"/>
  <text x="148" y="108" fill="#00cc6a" font-size="7" text-anchor="middle">HTTPS</text>

  <!-- DNS Lookup -->
  <rect x="168" y="90" width="95" height="50" rx="6" fill="#1a1a2e" stroke="#f6821f" stroke-width="1"/>
  <text x="215" y="112" fill="#f6821f" font-size="10" text-anchor="middle">DNS</text>
  <text x="215" y="128" fill="#888" font-size="8" text-anchor="middle">CNAME</text>

  <!-- Arrow: DNS -> Edge -->
  <line x1="263" y1="115" x2="298" y2="115" stroke="#f6821f" stroke-width="1.5" marker-end="url(#sf-arrow-orange)"/>

  <!-- Cloudflare Edge -->
  <rect x="301" y="90" width="95" height="50" rx="6" fill="#1a1a2e" stroke="#f6821f" stroke-width="1"/>
  <text x="348" y="112" fill="#f6821f" font-size="10" text-anchor="middle">CF Edge</text>
  <text x="348" y="128" fill="#888" font-size="8" text-anchor="middle">TLS termination</text>

  <!-- Arrow: Edge -> Access -->
  <line x1="396" y1="115" x2="431" y2="115" stroke="#f6821f" stroke-width="1.5" marker-end="url(#sf-arrow-orange)"/>

  <!-- Cloudflare Access -->
  <rect x="434" y="82" width="110" height="66" rx="6" fill="#1a1a2e" stroke="#00ff88" stroke-width="1.5" filter="url(#sf-shadow)"/>
  <text x="489" y="105" fill="#00ff88" font-size="10" font-weight="bold" text-anchor="middle">Zero Trust</text>
  <text x="489" y="120" fill="#00cc6a" font-size="8" text-anchor="middle">Access Policy</text>
  <text x="489" y="135" fill="#555" font-size="7" text-anchor="middle">Email OTP</text>

  <!-- Arrow: Access -> Tunnel -->
  <line x1="544" y1="115" x2="579" y2="115" stroke="#00ff88" stroke-width="1.5" marker-end="url(#sf-arrow)"/>
  <text x="562" y="108" fill="#00cc6a" font-size="7" text-anchor="middle">OK</text>

  <!-- Tunnel -->
  <rect x="582" y="90" width="95" height="50" rx="6" fill="#1a1a2e" stroke="#f6821f" stroke-width="1"/>
  <text x="629" y="112" fill="#f6821f" font-size="10" text-anchor="middle">Tunnel</text>
  <text x="629" y="128" fill="#888" font-size="8" text-anchor="middle">encrypted</text>

  <!-- Arrow: Tunnel -> cloudflared -->
  <line x1="677" y1="115" x2="712" y2="115" stroke="#f6821f" stroke-width="1.5" marker-end="url(#sf-arrow-orange)"/>

  <!-- cloudflared agent -->
  <rect x="715" y="90" width="95" height="50" rx="6" fill="#1a1a2e" stroke="#2a2a3e" stroke-width="1"/>
  <text x="762" y="112" fill="#c0c0c0" font-size="10" text-anchor="middle">cloudflared</text>
  <text x="762" y="128" fill="#555" font-size="8" text-anchor="middle">on server</text>

  <!-- Arrow: cloudflared -> Docker -->
  <line x1="810" y1="115" x2="845" y2="115" stroke="#00ff88" stroke-width="1.5" marker-end="url(#sf-arrow)"/>

  <!-- Docker Container -->
  <rect x="848" y="85" width="55" height="60" rx="6" fill="#0d2818" stroke="#00ff88" stroke-width="1" filter="url(#sf-shadow)"/>
  <text x="875" y="112" fill="#00ff88" font-size="9" font-weight="bold" text-anchor="middle">App</text>
  <text x="875" y="130" fill="#00cc6a" font-size="7" text-anchor="middle">Docker</text>

  <!-- Not authenticated path -->
  <path d="M 489 148 L 489 170 Q 489 180 479 180 L 415 180 Q 405 180 405 170 L 405 148" stroke="#d63939" stroke-width="1" fill="none" stroke-dasharray="3,2"/>
  <text x="447" y="185" fill="#d63939" font-size="7" text-anchor="middle">not authenticated</text>
  <text x="405" y="165" fill="#d63939" font-size="7" text-anchor="middle">Email OTP</text>

  <!-- ===== PATH 2: TCP Direct (firewall rules) ===== -->
  <text x="30" y="235" fill="#d63939" font-size="10" font-weight="bold" letter-spacing="1">TCP DIRECT (Firewall Rules)</text>

  <!-- TCP Client -->
  <rect x="30" y="250" width="100" height="50" rx="8" fill="#12121a" stroke="#2a2a3e" stroke-width="1"/>
  <text x="80" y="272" fill="#888" font-size="10" text-anchor="middle">TCP Client</text>
  <text x="80" y="288" fill="#555" font-size="8" text-anchor="middle">Kafka, psql, S3</text>

  <!-- Arrow: TCP -> DNS -->
  <line x1="130" y1="275" x2="165" y2="275" stroke="#d63939" stroke-width="1.5" marker-end="url(#sf-arrow-red)"/>

  <!-- DNS A Record -->
  <rect x="168" y="250" width="95" height="50" rx="6" fill="#1a1a2e" stroke="#d63939" stroke-width="1"/>
  <text x="215" y="272" fill="#d63939" font-size="10" text-anchor="middle">DNS</text>
  <text x="215" y="288" fill="#888" font-size="8" text-anchor="middle">A record</text>

  <!-- Arrow: DNS -> Firewall -->
  <line x1="263" y1="275" x2="431" y2="275" stroke="#d63939" stroke-width="1.5" stroke-dasharray="4,2" marker-end="url(#sf-arrow-red)"/>
  <text x="347" y="268" fill="#555" font-size="7" text-anchor="middle">direct to server IP (not proxied)</text>

  <!-- Firewall -->
  <rect x="434" y="248" width="110" height="54" rx="6" fill="#1a0d0d" stroke="#d63939" stroke-width="1.5"/>
  <text x="489" y="270" fill="#d63939" font-size="10" font-weight="bold" text-anchor="middle">Firewall</text>
  <text x="489" y="286" fill="#888" font-size="8" text-anchor="middle">managed via UI</text>

  <!-- Arrow: Firewall -> Service -->
  <line x1="544" y1="275" x2="845" y2="275" stroke="#d63939" stroke-width="1" stroke-dasharray="4,2" marker-end="url(#sf-arrow-red)"/>
  <text x="695" y="268" fill="#555" font-size="7" text-anchor="middle">only explicitly opened ports</text>

  <!-- TCP Service -->
  <rect x="848" y="250" width="55" height="50" rx="6" fill="#12121a" stroke="#2a2a3e" stroke-width="1"/>
  <text x="875" y="272" fill="#888" font-size="9" text-anchor="middle">TCP</text>
  <text x="875" y="288" fill="#555" font-size="7" text-anchor="middle">port</text>

  <!-- ===== Info boxes ===== -->
  <rect x="30" y="325" width="270" height="40" rx="6" fill="#0d2818" stroke="#00ff88" stroke-width="0.5"/>
  <text x="165" y="343" fill="#00ff88" font-size="9" text-anchor="middle">Default: 0 open ports</text>
  <text x="165" y="357" fill="#00cc6a" font-size="8" text-anchor="middle">All traffic through Cloudflare Tunnel</text>

  <rect x="325" y="325" width="270" height="40" rx="6" fill="#1a0d0d" stroke="#d63939" stroke-width="0.5"/>
  <text x="460" y="343" fill="#d63939" font-size="9" text-anchor="middle">TCP ports: opt-in via Control Plane</text>
  <text x="460" y="357" fill="#888" font-size="8" text-anchor="middle">Auto-reset on every Teardown</text>

  <rect x="620" y="325" width="280" height="40" rx="6" fill="#12121a" stroke="#2a2a3e" stroke-width="0.5"/>
  <text x="760" y="343" fill="#888" font-size="9" text-anchor="middle">Public services: set public = true</text>
  <text x="760" y="357" fill="#555" font-size="8" text-anchor="middle">Bypasses Zero Trust (app handles auth)</text>
</svg>

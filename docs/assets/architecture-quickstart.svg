<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 320" font-family="'SF Mono', 'Fira Code', 'Consolas', monospace">
  <defs>
    <linearGradient id="qs-glow" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#00ff88;stop-opacity:0.15"/>
      <stop offset="100%" style="stop-color:#00ff88;stop-opacity:0.05"/>
    </linearGradient>
    <filter id="qs-shadow">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-color="#00ff88" flood-opacity="0.2"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="900" height="320" rx="12" fill="#0a0a0f"/>
  <rect width="900" height="320" rx="12" fill="url(#qs-glow)" opacity="0.5"/>

  <!-- Step 1: Preparation -->
  <rect x="20" y="40" width="190" height="240" rx="8" fill="#12121a" stroke="#1e1e2e" stroke-width="1"/>
  <text x="115" y="70" fill="#00ff88" font-size="11" font-weight="bold" text-anchor="middle" letter-spacing="1">1. PREPARATION</text>

  <rect x="35" y="90" width="160" height="32" rx="6" fill="#1a1a2e" stroke="#00ff88" stroke-width="1" filter="url(#qs-shadow)"/>
  <text x="115" y="111" fill="#e0e0e0" font-size="11" text-anchor="middle">Fork Repository</text>

  <line x1="115" y1="122" x2="115" y2="138" stroke="#00ff88" stroke-width="1" stroke-dasharray="3,3"/>

  <rect x="35" y="138" width="160" height="32" rx="6" fill="#1a1a2e" stroke="#2a2a3e" stroke-width="1"/>
  <text x="115" y="159" fill="#e0e0e0" font-size="11" text-anchor="middle">Create Accounts</text>

  <rect x="40" y="180" width="70" height="24" rx="4" fill="#1a1a2e" stroke="#d63939" stroke-width="1"/>
  <text x="75" y="196" fill="#d63939" font-size="9" text-anchor="middle">Hetzner</text>

  <rect x="120" y="180" width="70" height="24" rx="4" fill="#1a1a2e" stroke="#f6821f" stroke-width="1"/>
  <text x="155" y="196" fill="#f6821f" font-size="9" text-anchor="middle">Cloudflare</text>

  <rect x="40" y="212" width="70" height="24" rx="4" fill="#1a1a2e" stroke="#2a2a3e" stroke-width="1" stroke-dasharray="3,2"/>
  <text x="75" y="228" fill="#666" font-size="9" text-anchor="middle">Resend</text>
  <text x="75" y="248" fill="#444" font-size="7" text-anchor="middle">optional</text>

  <rect x="120" y="212" width="70" height="24" rx="4" fill="#1a1a2e" stroke="#2a2a3e" stroke-width="1" stroke-dasharray="3,2"/>
  <text x="155" y="228" fill="#666" font-size="9" text-anchor="middle">Docker Hub</text>
  <text x="155" y="248" fill="#444" font-size="7" text-anchor="middle">optional</text>

  <!-- Arrow 1->2 -->
  <line x1="210" y1="160" x2="240" y2="160" stroke="#00ff88" stroke-width="2" marker-end="url(#qs-arrow)"/>
  <defs><marker id="qs-arrow" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
    <polygon points="0 0, 8 3, 0 6" fill="#00ff88"/>
  </marker></defs>

  <!-- Step 2: Configuration -->
  <rect x="245" y="40" width="190" height="240" rx="8" fill="#12121a" stroke="#1e1e2e" stroke-width="1"/>
  <text x="340" y="70" fill="#00ff88" font-size="11" font-weight="bold" text-anchor="middle" letter-spacing="1">2. CONFIGURATION</text>

  <rect x="260" y="95" width="160" height="32" rx="6" fill="#1a1a2e" stroke="#2a2a3e" stroke-width="1"/>
  <text x="340" y="116" fill="#e0e0e0" font-size="11" text-anchor="middle">Generate API Tokens</text>

  <line x1="340" y1="127" x2="340" y2="148" stroke="#00ff88" stroke-width="1" stroke-dasharray="3,3"/>

  <rect x="260" y="148" width="160" height="32" rx="6" fill="#1a1a2e" stroke="#2a2a3e" stroke-width="1"/>
  <text x="340" y="169" fill="#e0e0e0" font-size="11" text-anchor="middle">Add GitHub Secrets</text>

  <line x1="340" y1="180" x2="340" y2="201" stroke="#00ff88" stroke-width="1" stroke-dasharray="3,3"/>

  <rect x="260" y="201" width="160" height="32" rx="6" fill="#1a1a2e" stroke="#2a2a3e" stroke-width="1"/>
  <text x="340" y="222" fill="#e0e0e0" font-size="11" text-anchor="middle">Select Services</text>

  <!-- Arrow 2->3 -->
  <line x1="435" y1="160" x2="465" y2="160" stroke="#00ff88" stroke-width="2" marker-end="url(#qs-arrow)"/>

  <!-- Step 3: Deploy -->
  <rect x="470" y="40" width="190" height="240" rx="8" fill="#12121a" stroke="#1e1e2e" stroke-width="1"/>
  <text x="565" y="70" fill="#00ff88" font-size="11" font-weight="bold" text-anchor="middle" letter-spacing="1">3. DEPLOY</text>

  <rect x="485" y="95" width="160" height="32" rx="6" fill="#1a1a2e" stroke="#00ff88" stroke-width="1" filter="url(#qs-shadow)"/>
  <text x="565" y="116" fill="#e0e0e0" font-size="11" text-anchor="middle">Run Initial Setup</text>

  <line x1="565" y1="127" x2="565" y2="148" stroke="#00ff88" stroke-width="1" stroke-dasharray="3,3"/>

  <rect x="485" y="148" width="160" height="32" rx="6" fill="#1a1a2e" stroke="#2a2a3e" stroke-width="1"/>
  <text x="565" y="169" fill="#e0e0e0" font-size="11" text-anchor="middle">Control Plane Ready</text>

  <line x1="565" y1="180" x2="565" y2="201" stroke="#00ff88" stroke-width="1" stroke-dasharray="3,3"/>

  <rect x="485" y="201" width="160" height="32" rx="6" fill="#1a1a2e" stroke="#2a2a3e" stroke-width="1"/>
  <text x="565" y="222" fill="#e0e0e0" font-size="11" text-anchor="middle">Services Running</text>

  <!-- Arrow 3->4 -->
  <line x1="660" y1="160" x2="690" y2="160" stroke="#00ff88" stroke-width="2" marker-end="url(#qs-arrow)"/>

  <!-- Step 4: Access -->
  <rect x="695" y="40" width="185" height="240" rx="8" fill="#12121a" stroke="#1e1e2e" stroke-width="1"/>
  <text x="787" y="70" fill="#00ff88" font-size="11" font-weight="bold" text-anchor="middle" letter-spacing="1">4. ACCESS</text>

  <rect x="710" y="95" width="155" height="32" rx="6" fill="#1a1a2e" stroke="#2a2a3e" stroke-width="1"/>
  <text x="787" y="116" fill="#e0e0e0" font-size="11" text-anchor="middle">Login via Email OTP</text>

  <line x1="787" y1="127" x2="787" y2="148" stroke="#00ff88" stroke-width="1" stroke-dasharray="3,3"/>

  <rect x="710" y="148" width="155" height="45" rx="6" fill="#0d2818" stroke="#00ff88" stroke-width="1.5" filter="url(#qs-shadow)"/>
  <text x="787" y="168" fill="#00ff88" font-size="11" font-weight="bold" text-anchor="middle">Use Your Services</text>
  <text x="787" y="183" fill="#00cc6a" font-size="9" text-anchor="middle">61 stacks available</text>

  <line x1="787" y1="193" x2="787" y2="209" stroke="#00ff88" stroke-width="1" stroke-dasharray="3,3"/>

  <rect x="710" y="209" width="155" height="32" rx="6" fill="#1a1a2e" stroke="#2a2a3e" stroke-width="1"/>
  <text x="787" y="225" fill="#888" font-size="9" text-anchor="middle">control.yourdomain.com</text>

  <!-- Time estimate -->
  <text x="450" y="305" fill="#444" font-size="10" text-anchor="middle">Setup time: ~15 minutes</text>
</svg>

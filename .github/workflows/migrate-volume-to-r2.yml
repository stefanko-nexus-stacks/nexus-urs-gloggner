name: Migrate Volume to R2 (one-time)

# RFC 0001 cutover helper. Run this ONCE per stack, BEFORE the next
# spinup/teardown cycle that uses the new S3-persistence path, to
# evacuate the currently-mounted Hetzner volume's data into R2.
# After this completes successfully:
#   - R2 has a verified snapshot under snapshots/<timestamp>/
#   - snapshots/latest.txt points at it
#   - the next `python -m nexus_deploy run-pipeline` will restore
#     from R2 onto the local SSD, and the Hetzner volume is no
#     longer needed
#
# Unlike teardown.yml's s3-snapshot step, this workflow does NOT
# call `tofu destroy` afterwards — its single purpose is to seed
# R2 from the current live state. The next normal spinup/teardown
# handles destroy.
#
# Workflow-dispatch from a feature branch is supported:
#   gh workflow run migrate-volume-to-r2.yml --ref <branch>
# This is the intended invocation if you're rolling out the S3
# cutover PR — run from the cutover branch BEFORE merging so the
# evacuation happens while hcloud_volume is still in Tofu state.

on:
  workflow_dispatch:
    inputs:
      confirm:
        description: 'Type "MIGRATE" to confirm — this stops gitea + dify briefly'
        required: true
        type: string

permissions:
  contents: read

concurrency:
  # Shared group with teardown.yml so a teardown can't race with the
  # migration (which would yank the volume out from under the
  # snapshot in progress).
  #
  # NOTE: spin-up.yml's ``workflow_dispatch`` path runs WITHOUT this
  # lock by design (operators may need to redeploy on top of a
  # running stack); a manually-triggered spin-up could in principle
  # overlap with this migration. The migration runs once per stack
  # during the legacy-volume cutover and is gated by ``confirm=
  # MIGRATE`` — operators are expected to leave the stack alone
  # for the ~5 min the migration takes. If we ever need a hard
  # mutex against spin-up too, both workflows must opt into the
  # same group.
  group: infrastructure
  cancel-in-progress: false

jobs:
  migrate:
    name: Evacuate Hetzner volume → R2
    runs-on: ubuntu-latest
    if: github.event.inputs.confirm == 'MIGRATE'
    env:
      TF_VAR_cloudflare_api_token: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      TF_VAR_cloudflare_account_id: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
      TF_VAR_cloudflare_zone_id: ${{ secrets.CLOUDFLARE_ZONE_ID }}
      TF_VAR_hcloud_token: ${{ secrets.HCLOUD_TOKEN }}
      TF_VAR_domain: ${{ secrets.DOMAIN }}
      TF_VAR_access_emails: ${{ secrets.ACCESS_EMAILS }}
      TF_VAR_infisical_token: ${{ secrets.INFISICAL_TOKEN }}
      TF_VAR_github_owner: ${{ github.repository_owner }}
      TF_VAR_github_repo: ${{ github.event.repository.name }}

    steps:
      - name: Validate confirmation
        run: |
          if [ "${{ github.event.inputs.confirm }}" != "MIGRATE" ]; then
            echo "❌ Migration cancelled. You must type 'MIGRATE' to confirm."
            exit 1
          fi
          echo "⚙️  MIGRATION CONFIRMED — evacuating volume to R2"
          echo "   gitea + dify will be stopped briefly during pg_dump."

      - name: Checkout
        uses: actions/checkout@v5

      - name: Install OpenTofu
        uses: opentofu/setup-opentofu@v2
        with:
          tofu_version: 1.10.0

      - name: Install uv
        # Same pin as spin-up.yml / teardown.yml / python-tests.
        uses: astral-sh/setup-uv@v3
        with:
          version: "0.11.7"
          enable-cache: true

      - name: Sync nexus_deploy runtime deps
        run: uv sync --frozen --no-dev

      - name: Install cloudflared
        # Needed for SSH-over-Cloudflare-Access (ProxyCommand) by
        # `nexus_deploy.pipeline.run_snapshot`.
        run: |
          curl -fsSL https://github.com/cloudflare/cloudflared/releases/latest/download/cloudflared-linux-amd64 -o cloudflared
          chmod +x cloudflared
          sudo mv cloudflared /usr/local/bin/

      - name: Create R2 credentials from secrets
        run: |
          mkdir -p tofu

          R2_ACCESS_KEY_ID=$(echo -n "${{ secrets.R2_ACCESS_KEY_ID }}" | tr -d '[:space:]')
          R2_SECRET_ACCESS_KEY=$(echo -n "${{ secrets.R2_SECRET_ACCESS_KEY }}" | tr -d '[:space:]')
          BUCKET_NAME=$(echo "${{ secrets.DOMAIN }}" | tr '.' '-')-terraform-state

          cat > tofu/.r2-credentials << EOF
          R2_ACCESS_KEY_ID="${R2_ACCESS_KEY_ID}"
          R2_SECRET_ACCESS_KEY="${R2_SECRET_ACCESS_KEY}"
          EOF
          sed -i 's/^          //' tofu/.r2-credentials

          cat > tofu/backend.hcl << EOF
          endpoints = {
            s3 = "https://${{ secrets.CLOUDFLARE_ACCOUNT_ID }}.r2.cloudflarestorage.com"
          }
          bucket = "${BUCKET_NAME}"
          EOF
          sed -i 's/^          //' tofu/backend.hcl

      - name: Generate minimal config.tfvars
        # Migration needs the SSH coords (domain + access_emails)
        # from Tofu state — the snapshot CLI builds the SSH host from
        # tfvars.domain. We don't run `tofu apply` here, just `tofu
        # output` reads to drive the SSH setup, so a minimal tfvars
        # is enough.
        env:
          DOMAIN: ${{ secrets.DOMAIN }}
        run: |
          cat > tofu/stack/config.tfvars << EOF
          server_type     = "${{ vars.SERVER_TYPE || 'cx43' }}"
          server_location = "${{ vars.SERVER_LOCATION || 'hel1' }}"
          server_image    = "ubuntu-24.04"
          ssh_public_key_path  = "~/.ssh/id_ed25519.pub"
          ssh_private_key_path = "~/.ssh/id_ed25519"
          domain         = "${{ secrets.DOMAIN }}"
          admin_email    = "${{ secrets.TF_VAR_admin_email }}"
          user_email     = "${{ secrets.TF_VAR_user_email }}"
          subdomain_separator = "${{ secrets.SUBDOMAIN_SEPARATOR || '.' }}"
          github_owner   = "${{ github.repository_owner }}"
          github_repo    = "${{ github.event.repository.name }}"
          EOF
          sed -i 's/^          //' tofu/stack/config.tfvars

      - name: Initialize OpenTofu (read-only state access)
        run: |
          cd tofu/stack
          source ../.r2-credentials
          export AWS_ACCESS_KEY_ID="$R2_ACCESS_KEY_ID"
          export AWS_SECRET_ACCESS_KEY="$R2_SECRET_ACCESS_KEY"
          tofu init -backend-config=../backend.hcl

      - name: Snapshot live state to R2
        # Identical wiring to teardown.yml's snapshot step, minus the
        # destroy that follows. snapshot_to_s3 stops gitea + dify,
        # pg_dumps + rclone-syncs, verifies, and points
        # snapshots/latest.txt — same atomicity contract as the
        # teardown path.
        env:
          # Hard-set, NOT ${{ secrets.NEXUS_S3_PERSISTENCE || 'true' }}.
          # If the operator accidentally set the secret to "false"
          # (e.g. during a partial cutover experiment), the fallback
          # form would silently skip the snapshot AND the workflow
          # would still print "Migration complete" → false positive
          # → data loss when the volume gets destroyed in the next
          # tofu apply. Pinning to "true" here removes that footgun;
          # the whole point of this workflow is to force a snapshot.
          NEXUS_S3_PERSISTENCE: "true"
          # R2 persistence-bucket coords — derived from already-
          # existing secrets (see spin-up.yml for the same wiring +
          # rationale). No new operator-set secret needed.
          PERSISTENCE_S3_ENDPOINT: https://${{ secrets.CLOUDFLARE_ACCOUNT_ID }}.r2.cloudflarestorage.com
          PERSISTENCE_S3_REGION: auto
          R2_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          R2_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          PERSISTENCE_STACK_SLUG: ${{ secrets.PERSISTENCE_STACK_SLUG || github.event.repository.name }}
          PERSISTENCE_TEMPLATE_VERSION: ${{ github.ref_name }}
        run: |
          # See spin-up.yml's matching step for the rationale.
          DOMAIN_SLUG=$(echo "${{ secrets.DOMAIN }}" | tr '.' '-')
          export PERSISTENCE_S3_BUCKET="nexus-${DOMAIN_SLUG}-persistence"
          # Lowercase the slug (see spin-up.yml / teardown.yml for
          # the full rationale — workflow fallback is the camel-
          # case repo name, validator wants S3 bucket-name shape).
          PERSISTENCE_STACK_SLUG=$(echo "$PERSISTENCE_STACK_SLUG" | tr '[:upper:]' '[:lower:]')
          export PERSISTENCE_STACK_SLUG

          uv run --quiet --project "$GITHUB_WORKSPACE" \
            python -m nexus_deploy s3-snapshot

      - name: Confirm migration
        run: |
          echo ""
          echo "✅ Migration complete:"
          echo "   ✓ Volume data snapshotted to R2"
          echo "   ✓ snapshots/latest.txt updated"
          echo ""
          echo "📋 Next steps:"
          echo "   1. Merge the S3-persistence cutover PR (if not already)."
          echo "   2. Run spin-up.yml — restore_from_s3 will load this snapshot."
          echo "   3. The Hetzner volume gets destroyed by tofu apply on next deploy."

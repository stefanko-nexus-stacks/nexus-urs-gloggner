name: Destroy All Infrastructure

on:
  workflow_dispatch:
    inputs:
      confirm:
        description: 'Type "DESTROY" (uppercase) to confirm FULL destruction'
        required: true
        type: string

permissions:
  contents: read

concurrency:
  group: infrastructure
  cancel-in-progress: false

jobs:
  destroy:
    name: Destroy All Nexus-Stack Resources
    runs-on: ubuntu-latest
    if: github.event.inputs.confirm == 'DESTROY'
    env:
      TF_VAR_cloudflare_api_token: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      TF_VAR_cloudflare_account_id: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
      TF_VAR_cloudflare_zone_id: ${{ secrets.CLOUDFLARE_ZONE_ID }}
      TF_VAR_hcloud_token: ${{ secrets.HCLOUD_TOKEN }}
      TF_VAR_domain: ${{ secrets.DOMAIN }}
      TF_VAR_access_emails: ${{ secrets.ACCESS_EMAILS }}
      TF_VAR_infisical_token: ${{ secrets.INFISICAL_TOKEN }}
      TF_VAR_github_owner: ${{ github.repository_owner }}
      TF_VAR_github_repo: ${{ github.event.repository.name }}
      TF_VAR_hetzner_object_storage_access_key: ${{ secrets.HETZNER_OBJECT_STORAGE_ACCESS_KEY }}
      TF_VAR_hetzner_object_storage_secret_key: ${{ secrets.HETZNER_OBJECT_STORAGE_SECRET_KEY }}
      TF_VAR_external_s3_endpoint: ${{ secrets.EXTERNAL_S3_ENDPOINT }}
      TF_VAR_external_s3_region: ${{ secrets.EXTERNAL_S3_REGION || 'auto' }}
      TF_VAR_external_s3_access_key: ${{ secrets.EXTERNAL_S3_ACCESS_KEY }}
      TF_VAR_external_s3_secret_key: ${{ secrets.EXTERNAL_S3_SECRET_KEY }}
      TF_VAR_external_s3_bucket: ${{ secrets.EXTERNAL_S3_BUCKET }}
      TF_VAR_external_s3_label: ${{ secrets.EXTERNAL_S3_LABEL }}
      TF_VAR_r2_data_access_key: ${{ secrets.R2_DATA_ACCESS_KEY_ID || secrets.R2_ACCESS_KEY_ID }}
      TF_VAR_r2_data_secret_key: ${{ secrets.R2_DATA_SECRET_ACCESS_KEY || secrets.R2_SECRET_ACCESS_KEY }}
      TF_VAR_r2_data_bucket: ${{ secrets.R2_DATA_BUCKET }}

    steps:
      - name: Validate confirmation
        run: |
          if [ "${{ github.event.inputs.confirm }}" != "DESTROY" ]; then
            echo "❌ Destruction cancelled. You must type 'DESTROY' (uppercase) to confirm."
            exit 1
          fi
          echo "⚠️  DESTRUCTION CONFIRMED - This will delete ALL infrastructure and state!"

      - name: Checkout
        uses: actions/checkout@v5

      - name: Install OpenTofu
        uses: opentofu/setup-opentofu@v2
        with:
          tofu_version: 1.10.0

      - name: Generate SSH key for OpenTofu
        run: |
          mkdir -p ~/.ssh
          ssh-keygen -t ed25519 -f ~/.ssh/id_ed25519 -N "" -C "github-actions@nexus-stack"
          chmod 600 ~/.ssh/id_ed25519
          chmod 644 ~/.ssh/id_ed25519.pub

      - name: Create R2 credentials from secrets
        run: |
          mkdir -p tofu tofu/control-plane tofu/stack
          
          # Generate dynamic bucket name from domain
          BUCKET_NAME=$(echo "${{ secrets.DOMAIN }}" | tr '.' '-')-terraform-state
          echo "📦 Using bucket: $BUCKET_NAME"
          
          cat > tofu/.r2-credentials << EOF
          R2_ACCESS_KEY_ID="${{ secrets.R2_ACCESS_KEY_ID }}"
          R2_SECRET_ACCESS_KEY="${{ secrets.R2_SECRET_ACCESS_KEY }}"
          EOF
          
          cat > tofu/backend.hcl << EOF
          endpoints = {
            s3 = "https://${{ secrets.CLOUDFLARE_ACCOUNT_ID }}.r2.cloudflarestorage.com"
          }
          bucket = "${BUCKET_NAME}"
          EOF

      - name: Generate config.tfvars
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          DOMAIN: ${{ secrets.DOMAIN }}
        run: |
          # Stack config (emails from secrets)
          cat > tofu/stack/config.tfvars << EOF
          server_type     = "cax31"
          server_location = "${{ vars.SERVER_LOCATION || 'fsn1' }}"
          server_image    = "ubuntu-24.04"
          ssh_public_key_path  = "~/.ssh/id_ed25519.pub"
          ssh_private_key_path = "~/.ssh/id_ed25519"
          domain         = "${{ secrets.DOMAIN }}"
          admin_email    = "${{ secrets.TF_VAR_admin_email }}"
          user_email     = "${{ secrets.TF_VAR_user_email }}"
          admin_username = "admin"
          github_owner   = "${{ github.repository_owner }}"
          github_repo    = "${{ github.event.repository.name }}"
          EOF
          
          # Read services from D1 (single source of truth)
          echo "📋 Reading services from D1..."
          D1_DATABASE_NAME="nexus-${DOMAIN//./-}-db"
          ENABLED_SERVICES=$(npx wrangler@4 d1 execute "$D1_DATABASE_NAME" --remote --json \
            --command "SELECT name FROM services WHERE enabled = 1" 2>/dev/null \
            | jq -r '.[0].results | map(.name) | join(",")' 2>/dev/null || echo "")
          
          if [ -n "$ENABLED_SERVICES" ]; then
            echo "📋 Enabled services from D1: $ENABLED_SERVICES"
          else
            echo "📋 No services in D1 yet - core services will be enabled by default"
          fi
          
          # Generate services config from services.yaml
          # Use shared script to avoid code duplication
          chmod +x .github/scripts/generate-services-tfvars.py
          ENABLED_SERVICES="$ENABLED_SERVICES" python3 .github/scripts/generate-services-tfvars.py
          
          # Control Plane config
          cat > tofu/control-plane/config.tfvars << EOF
          server_type         = "cax31"
          server_location     = "${{ vars.SERVER_LOCATION || 'fsn1' }}"
          domain              = "${{ secrets.DOMAIN }}"
          subdomain_separator = "${{ secrets.SUBDOMAIN_SEPARATOR || '.' }}"
          admin_email         = "${{ secrets.TF_VAR_admin_email }}"
          user_email          = "${{ secrets.TF_VAR_user_email }}"
          github_owner        = "${{ github.repository_owner }}"
          github_repo         = "${{ github.event.repository.name }}"
          EOF

      - name: Initialize OpenTofu for both states
        run: |
          source tofu/.r2-credentials
          export AWS_ACCESS_KEY_ID="$R2_ACCESS_KEY_ID"
          export AWS_SECRET_ACCESS_KEY="$R2_SECRET_ACCESS_KEY"

          # Skip if R2 credentials are empty (already cleaned up by previous destroy)
          if [ -z "$R2_ACCESS_KEY_ID" ] || [ -z "$R2_SECRET_ACCESS_KEY" ]; then
            echo "⚠️  R2 credentials not found — infrastructure may already be destroyed"
            echo "   Run initial-setup to re-deploy, or delete remaining resources manually"
            echo "SKIP_TOFU_DESTROY=true" >> "$GITHUB_ENV"
            exit 0
          fi

          # Initialize Nexus Stack state
          cd tofu/stack
          INIT_OUTPUT=$(tofu init -backend-config=../backend.hcl 2>&1) && INIT_OK=true || INIT_OK=false
          if [ "$INIT_OK" = "false" ]; then
            if echo "$INIT_OUTPUT" | grep -qi "NoSuchBucket\|bucket does not exist"; then
              echo "⚠️  R2 state bucket not found — state already empty, skipping destroy"
              echo "SKIP_TOFU_DESTROY=true" >> "$GITHUB_ENV"
              exit 0
            else
              echo "❌ Failed to initialize Nexus Stack backend:"
              echo "$INIT_OUTPUT"
              exit 1
            fi
          fi
          echo "✅ Nexus Stack backend initialized"

          # Initialize Control Plane state
          cd ../control-plane
          INIT_OUTPUT=$(tofu init -backend-config=../backend.hcl 2>&1) && INIT_OK=true || INIT_OK=false
          if [ "$INIT_OK" = "false" ]; then
            if echo "$INIT_OUTPUT" | grep -qi "NoSuchBucket\|bucket does not exist"; then
              echo "⚠️  R2 state bucket not found — state already empty, skipping destroy"
              echo "SKIP_TOFU_DESTROY=true" >> "$GITHUB_ENV"
              exit 0
            else
              echo "❌ Failed to initialize Control Plane backend:"
              echo "$INIT_OUTPUT"
              exit 1
            fi
          fi
          echo "✅ Control Plane backend initialized"

          # Get persistent volume ID from control-plane and add to stack config
          PERSISTENT_VOLUME_ID=$(tofu output -raw persistent_volume_id 2>/dev/null || echo "0")
          # Validate ID is numeric (tofu wrapper may write ::error:: to stdout)
          if [[ ! "$PERSISTENT_VOLUME_ID" =~ ^[0-9]+$ ]]; then
            PERSISTENT_VOLUME_ID="0"
          fi
          cd ../..
          echo "" >> tofu/stack/config.tfvars
          printf 'persistent_volume_id = %s\n' "$PERSISTENT_VOLUME_ID" >> tofu/stack/config.tfvars
          if [ "$PERSISTENT_VOLUME_ID" != "0" ]; then
            echo "💾 Persistent volume will be destroyed (ID: $PERSISTENT_VOLUME_ID)"
          fi

      - name: Destroy Nexus Stack infrastructure
        if: env.SKIP_TOFU_DESTROY != 'true'
        run: |
          cd tofu/stack
          source ../.r2-credentials
          export AWS_ACCESS_KEY_ID="$R2_ACCESS_KEY_ID"
          export AWS_SECRET_ACCESS_KEY="$R2_SECRET_ACCESS_KEY"

          echo "🗑️  Destroying Nexus Stack (Server, Tunnel, Services)..."
          if ! tofu destroy -var-file=config.tfvars -auto-approve; then
            echo "❌ ERROR: Failed to destroy Nexus Stack infrastructure"
            echo "   Resources may still be running in Hetzner Cloud - check logs above"
            exit 1
          fi
          echo "✅ Nexus Stack destroyed successfully"

      - name: Destroy Control Plane infrastructure
        if: env.SKIP_TOFU_DESTROY != 'true'
        run: |
          cd tofu/control-plane
          source ../.r2-credentials
          export AWS_ACCESS_KEY_ID="$R2_ACCESS_KEY_ID"
          export AWS_SECRET_ACCESS_KEY="$R2_SECRET_ACCESS_KEY"

          # Protect persistent volume from destruction (keeps Gitea repos etc.)
          echo "💾 Protecting persistent volume from destroy..."
          tofu state rm hcloud_volume.persistent 2>/dev/null || true

          # Protect KV namespace from destruction (keeps Databricks config etc.)
          echo "💾 Protecting KV namespace from destroy..."
          tofu state rm cloudflare_workers_kv_namespace.config 2>/dev/null || true

          # Protect ALL Hetzner S3 buckets from destruction (keeps student data)
          # Uses dynamic discovery so new buckets are automatically covered
          echo "💾 Protecting Hetzner S3 buckets from destroy..."
          for RESOURCE in $(tofu state list 2>/dev/null | grep '^minio_s3_bucket\.' || true); do
            echo "   Removing $RESOURCE from state..."
            tofu state rm "$RESOURCE" 2>/dev/null || true
          done

          echo "🗑️  Destroying Control Plane (Pages, Worker, DNS)..."
          if ! tofu destroy -var-file=config.tfvars -auto-approve; then
            echo "❌ ERROR: Failed to destroy Control Plane infrastructure"
            echo "   Resources may still exist in Cloudflare - check logs above"
            exit 1
          fi
          echo "✅ Control Plane destroyed successfully"

      # Note: Hetzner S3 buckets are intentionally preserved (student data).
      # They are re-imported into Terraform state on the next initial-setup.

      # Note: R2 state bucket, credentials, and API token are intentionally
      # preserved so that destroy-all can be re-run safely. The Terraform
      # state files inside the bucket are stale after destroy but harmless —
      # init-r2-state.sh reuses the bucket on next initial-setup.

      - name: Confirm destruction
        run: |
          echo ""
          echo "🗑️  All infrastructure has been destroyed:"
          echo "   - Hetzner Cloud server"
          echo "   - Cloudflare Tunnel"
          echo "   - Cloudflare DNS records"
          echo "   - Cloudflare Access policies"
          echo "   - Control Plane (Pages + Worker + D1)"
          echo "   - Hetzner Object Storage buckets (LakeFS, General)"
          echo ""
          echo "   Preserved (reused on next initial-setup):"
          echo "   - R2 state bucket and credentials"
          echo "   - R2 datalake bucket and credentials"
          echo ""
          echo "To redeploy, run the Initial Setup workflow."
